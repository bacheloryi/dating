<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>闪闪想念记录管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #FFE6F2 0%, #FFB6C1 50%, #FF69B4 100%);
            min-height: 100vh;
            padding: 30px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .login-card {
            background: white;
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 450px;
            margin: 100px auto;
            box-shadow: 0 10px 40px rgba(255, 105, 180, 0.3);
            text-align: center;
            border: 3px solid #FFB6C1;
        }

        .login-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            background: linear-gradient(135deg, #FF6B9D 0%, #FF8FAB 100%);
            box-shadow: 0 5px 20px rgba(255, 107, 157, 0.4);
        }

        .login-title {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 0.95rem;
            color: #888;
            margin-bottom: 35px;
        }

        .login-form {
            text-align: left;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 8px;
            padding-left: 5px;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #FFE6F2;
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #FFF9FC;
        }

        .form-input:focus {
            outline: none;
            border-color: #FF6B9D;
            box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg, #FF6B9D 0%, #FF8FAB 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.5);
        }

        .login-hint {
            margin-top: 25px;
            padding: 15px;
            background: #FFF0F5;
            border-radius: 15px;
            border: 1px solid #FFE6F2;
        }

        .login-hint-title {
            font-size: 0.85rem;
            color: #FF6B9D;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .hint-item {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
        }

        .error-message {
            color: #FF6B6B;
            font-size: 0.85rem;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.3);
            text-align: center;
        }

        .header h1 {
            color: #FF6B9D;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #888;
        }

        .user-info {
            font-size: 0.9rem;
            color: #FF6B9D;
            margin-top: 10px;
        }

        .logout-btn {
            background: none;
            border: 1px solid #FFB6C1;
            color: #FF6B9D;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-left: 10px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #FFE6F2;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(255, 105, 180, 0.2);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #FF6B9D;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #888;
            margin-top: 5px;
        }

        .result-list {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.3);
        }

        .result-list h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.4rem;
        }

        .result-item {
            border: 2px solid #FFE6F2;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .result-item:hover {
            border-color: #FF6B9D;
            box-shadow: 0 3px 15px rgba(255, 107, 157, 0.15);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .result-id {
            font-size: 0.85rem;
            color: #FF6B9D;
            font-weight: bold;
            background: #FFE6F2;
            padding: 5px 12px;
            border-radius: 20px;
        }

        .result-time {
            font-size: 0.85rem;
            color: #888;
        }

        .result-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .info-item {
            display: flex;
            align-items: center;
            font-size: 1rem;
            color: #555;
        }

        .info-icon {
            margin-right: 8px;
            font-size: 1.2rem;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #FF6B9D 0%, #FF8FAB 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .rating-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            background: #FFF0F5;
            color: #FF6B9D;
        }

        @media (max-width: 768px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .result-info {
                grid-template-columns: 1fr;
            }

            .result-header {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .login-card {
                padding: 30px 20px;
                margin: 50px auto;
            }
        }
    </style>
</head>
<body>
    <div class="page active" id="loginPage">
        <div class="login-card">
            <div class="login-icon">💖</div>
            <h1 class="login-title">登录想念记录</h1>
            <p class="login-subtitle">查看闪闪的想念记录</p>
            
            <div class="login-form">
                <div class="form-group">
                    <label class="form-label">账号（英语名字小写）</label>
                    <input type="text" class="form-input" id="username" placeholder="请输入账号">
                </div>
                <div class="form-group">
                    <label class="form-label">密码（认识的日子，8位数字）</label>
                    <input type="password" class="form-input" id="password" placeholder="请输入密码">
                </div>
                <button class="login-btn" onclick="login()">登录</button>
                <div class="error-message" id="errorMsg">账号或密码错误</div>
            </div>

            <div class="login-hint">
                <div class="login-hint-title">💡 提示：</div>
                <div class="hint-item">• zoe / 20260428</div>
                <div class="hint-item">• matthew / 20260428（管理员）</div>
            </div>
        </div>
    </div>

    <div class="page" id="mainPage">
        <div class="container">
            <div class="header">
                <h1>💖 闪闪想念记录 💖</h1>
                <p>查看闪闪有多想我~</p>
                <div class="user-info">
                    登录用户：<span id="currentUser"></span>
                    <button class="logout-btn" onclick="logout()">退出登录</button>
                </div>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">想念次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="todayCount">0</div>
                    <div class="stat-label">今天想念</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="avgRating">0</div>
                    <div class="stat-label">平均想念度</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="topReason">-</div>
                    <div class="stat-label">最常见原因</div>
                </div>
            </div>

            <div class="result-list">
                <button class="refresh-btn" onclick="loadResults()">🔄 刷新</button>
                <h2>想念记录</h2>
                <div id="resultsContainer">
                    <div class="empty">
                        <div class="empty-icon">💝</div>
                        <p>还没有想念记录，快去问问闪闪吧！</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const users = [
            { username: 'zoe', password: '20260428', role: 'user' },
            { username: 'matthew', password: '20260428', role: 'admin' }
        ];

        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMsg');
        const currentUserSpan = document.getElementById('currentUser');

        function login() {
            const username = usernameInput.value.trim().toLowerCase();
            const password = passwordInput.value.trim();

            const user = users.find(u => u.username === username && u.password === password);

            if (user) {
                errorMsg.style.display = 'none';
                localStorage.setItem('missLoggedInUser', JSON.stringify(user));
                showMainPage(user);
            } else {
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            }
        }

        function showMainPage(user) {
            document.getElementById('loginPage').classList.remove('active');
            document.getElementById('mainPage').classList.add('active');
            currentUserSpan.textContent = `${user.username} (${user.role === 'admin' ? '管理员' : '用户'})`;
            loadResults();
            setInterval(loadResults, 30000);
        }

        function logout() {
            localStorage.removeItem('missLoggedInUser');
            document.getElementById('mainPage').classList.remove('active');
            document.getElementById('loginPage').classList.add('active');
            usernameInput.value = '';
            passwordInput.value = '';
        }

        function loadResults() {
            fetch('/api/miss-results')
                .then(res => res.json())
                .then(results => {
                    renderResults(results);
                    updateStats(results);
                })
                .catch(err => {
                    console.error('获取失败:', err);
                });
        }

        function renderResults(results) {
            const container = document.getElementById('resultsContainer');
            
            if (results.length === 0) {
                container.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">💝</div>
                        <p>还没有想念记录，快去问问闪闪吧！</p>
                    </div>
                `;
                return;
            }

            const sortedResults = [...results].reverse();
            
            const ratingIcons = ['', '😐', '😊', '🥰', '😍', '💖'];
            const ratingPercentages = ['', '20%', '40%', '60%', '80%', '100%'];
            
            container.innerHTML = sortedResults.map(result => `
                <div class="result-item">
                    <div class="result-header">
                        <span class="result-id">#${result.id.toString().slice(-6)}</span>
                        <span class="result-time">${result.createdAt}</span>
                    </div>
                    <div class="result-info">
                        <div class="info-item">
                            <span class="info-icon">💕</span>
                            <span>想念度：<span class="rating-badge">${ratingPercentages[result.rating]} ${ratingIcons[result.rating]}</span></span>
                        </div>
                        <div class="info-item">
                            <span class="info-icon">💭</span>
                            <span>原因：${result.reason}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-icon">📸</span>
                            <span>回忆：${result.memory}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateStats(results) {
            document.getElementById('totalCount').textContent = results.length;
            
            const today = new Date().toLocaleDateString('zh-CN');
            const todayCount = results.filter(r => r.createdAt.includes(today)).length;
            document.getElementById('todayCount').textContent = todayCount;
            
            if (results.length > 0) {
                const avgRating = Math.round(results.reduce((sum, r) => sum + r.rating, 0) / results.length);
                const ratingPercentages = ['', '20%', '40%', '60%', '80%', '100%'];
                document.getElementById('avgRating').textContent = ratingPercentages[avgRating];
                
                const reasonCounts = {};
                results.forEach(r => {
                    reasonCounts[r.reason] = (reasonCounts[r.reason] || 0) + 1;
                });
                const topReason = Object.entries(reasonCounts).sort((a, b) => b[1] - a[1])[0][0];
                document.getElementById('topReason').textContent = topReason;
            }
        }

        const loggedInUser = localStorage.getItem('missLoggedInUser');
        if (loggedInUser) {
            showMainPage(JSON.parse(loggedInUser));
        }
    </script>
</body>
</html>
